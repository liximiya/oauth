<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page">
    <div class="card profile-card">
      <div class="avatar-wrap">
        <img id="avatar" class="avatar" src="/default-avatar.svg" alt="Аватар">
        <span class="status-dot"></span>
      </div>

      <h2 id="username" class="username">Загрузка...</h2>

      <ul class="info-list">
        <li>
          <div class="icon">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </div>
          <div>
            <div class="label">Логин</div>
            <div id="login" class="value">—</div>
          </div>
        </li>
        <li>
          <div class="icon">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
          </div>
          <div>
            <div class="label">Почта</div>
            <div id="email" class="value">—</div>
          </div>
        </li>
      </ul>

      <a href="/logout" class="btn btn-logout">Выйти</a>
    </div>
  </main>

  <script>
    async function loadProfile() {
      try {
        const res = await fetch('/api/me');

        if (!res.ok) {
          window.location.href = '/';
          return;
        }

        const user = await res.json();

        document.getElementById('avatar').alt = user.login;
        document.getElementById('username').textContent = user.login;
        document.getElementById('login').textContent = user.login;
        document.getElementById('email').textContent = user.email;
      } catch {
        window.location.href = '/';
      }
    }

    loadProfile();
  </script>
</body>
</html>
