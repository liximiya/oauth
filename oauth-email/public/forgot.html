<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Забыли пароль</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page">
    <div class="card">
      <h1 class="title">Забыли пароль?</h1>
      <p class="subtitle">Введите почту — отправим код для восстановления</p>

      <div id="error" class="error" hidden></div>
      <div id="success" class="success" hidden></div>

      <form id="forgot-form" class="form">
        <label class="field">
          <span>Почта</span>
          <input type="email" name="email" autocomplete="email" required>
        </label>
        <button type="submit" class="btn btn-primary">Отправить код</button>
      </form>

      <p class="footer-link">
        <a href="/">Вернуться ко входу</a>
      </p>
    </div>
  </main>

  <script>
    const form = document.getElementById('forgot-form');
    const errorEl = document.getElementById('error');
    const successEl = document.getElementById('success');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.hidden = true;
      successEl.hidden = true;

      const data = Object.fromEntries(new FormData(form));

      try {
        const res = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        const result = await res.json();

        if (!res.ok) {
          errorEl.textContent = result.error || 'Ошибка отправки';
          errorEl.hidden = false;
          return;
        }

        window.location.href = '/reset-password';
      } catch {
        errorEl.textContent = 'Ошибка сервера';
        errorEl.hidden = false;
      }
    });
  </script>
</body>
</html>
