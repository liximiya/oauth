<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ожидание авторизации</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page">
    <div class="card">
      <div class="waiting-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 0 0-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/>
        </svg>
      </div>

      <h1>Откройте Telegram</h1>
      <p class="subtitle">Нажмите кнопку ниже, выполните /start в боте и вернитесь сюда</p>

      <a id="bot-link" href="#" target="_blank" rel="noopener" class="btn btn-telegram">
        Открыть бота
      </a>
      <a href="/" class="btn btn-secondary">Отмена</a>

      <p id="status" class="status-text">Ожидание подтверждения в Telegram...</p>
    </div>
  </main>

  <script>
    let pollTimer;

    async function init() {
      try {
        const res = await fetch('/api/auth/bot-link');
        if (!res.ok) {
          window.location.href = '/';
          return;
        }

        const { url } = await res.json();
        const link = document.getElementById('bot-link');
        link.href = url;
        window.open(url, '_blank');
        startPolling();
      } catch {
        window.location.href = '/';
      }
    }

    function startPolling() {
      pollTimer = setInterval(async () => {
        try {
          const res = await fetch('/api/auth/status');
          const data = await res.json();

          if (data.status === 'completed') {
            clearInterval(pollTimer);
            window.location.href = '/profile';
            return;
          }

          if (data.status === 'expired') {
            clearInterval(pollTimer);
            window.location.href = '/?error=expired';
          }
        } catch {
          clearInterval(pollTimer);
        }
      }, 2000);
    }

    init();
  </script>
</body>
</html>
